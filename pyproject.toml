[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "zotsearch"
version = "2.1.0"
description = "Enhanced Zotero library and full-text PDF search"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Francisco Wilhelm" },
]
dependencies = [
    "flask>=3.0",
    "nltk>=3.9.1",
    "pypdfium2>=5.3.0",
    "pyzotero>=1.8.0",
    "PyYAML>=6.0.1",
]

[project.scripts]
zotsearch = "zotsearch.cli:main"

[tool.setuptools.packages.find]
include = ["zotsearch*"]
